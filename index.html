<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吳博の會議記錄精靈</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 隱藏元素的輔助 class */
        .hidden-view { display: none !important; }
        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* 讓選取講者的動畫更滑順 */
        .speaker-chip { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-indigo-200">

    <!-- 導覽列 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <!-- 質感漸層圖示 -->
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <i data-lucide="mic-vocal" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-700">
                    吳博の會議記錄精靈
                </h1>
            </div>
            <!-- 重新開始按鈕 -->
            <button id="btn-reset" class="hidden-view p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors" title="重新開始">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6 pb-24">
        
        <!-- 錯誤提示 -->
        <div id="error-box" class="hidden-view mb-6 p-4 bg-red-50 text-red-700 rounded-2xl flex items-start gap-3 border border-red-100 shadow-sm">
            <i data-lucide="alert-circle" class="shrink-0 mt-0.5 w-5 h-5"></i>
            <p id="error-text" class="text-sm font-medium"></p>
        </div>

        <!-- 輸入介面 (包含錄音與上傳) -->
        <div id="input-view" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-8">
            <!-- 頁籤切換 -->
            <div class="flex border-b border-slate-100 bg-slate-50/50" id="tabs-container">
                <button id="tab-record" class="flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors text-indigo-600 border-b-2 border-indigo-600 bg-white">
                    <i data-lucide="mic" class="w-4 h-4"></i> 即時錄音
                </button>
                <button id="tab-upload" class="flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors text-slate-500 hover:bg-slate-50">
                    <i data-lucide="upload" class="w-4 h-4"></i> 上傳錄音檔
                </button>
            </div>

            <div class="p-4 sm:p-8 flex flex-col items-center justify-center min-h-[350px]">
                
                <!-- === 初始錄音準備畫面 === -->
                <div id="panel-record-start" class="flex flex-col items-center w-full">
                    <div class="relative flex items-center justify-center w-36 h-36 rounded-full mb-6 bg-indigo-50/80 shadow-inner">
                        <button id="btn-start-record" class="relative z-10 flex items-center justify-center w-24 h-24 rounded-full text-white shadow-xl shadow-indigo-200 transition-transform hover:scale-105 active:scale-95 bg-gradient-to-r from-indigo-600 to-purple-600">
                            <i data-lucide="mic" class="w-10 h-10"></i>
                        </button>
                    </div>
                    <div class="text-center">
                        <h2 class="text-lg font-bold text-slate-700 mb-1">開始新的會議紀錄</h2>
                        <p class="text-slate-500 text-sm">點擊麥克風，精靈將自動為您聆聽與整理</p>
                    </div>
                </div>

                <!-- === 錄音進行中 / 暫停畫面 (儀表板) === -->
                <div id="panel-recording-dashboard" class="hidden-view flex flex-col items-center w-full max-w-xl">
                    <!-- 狀態與計時器 -->
                    <div class="flex items-center gap-3 mb-2">
                        <div id="record-indicator" class="w-3 h-3 rounded-full bg-red-500 animate-pulse shadow-md shadow-red-200"></div>
                        <p id="record-time" class="text-4xl font-mono font-light text-slate-700 tracking-tight">00:00</p>
                    </div>
                    <p id="record-status-text" class="text-sm font-medium text-red-500 mb-6">正在錄音中...</p>

                    <!-- === 智慧講者標註區 (全新升級) === -->
                    <div class="w-full mb-6 bg-indigo-50/60 p-4 rounded-2xl border border-indigo-100 flex flex-col gap-3">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <div class="flex items-center gap-2 text-indigo-700 font-bold whitespace-nowrap">
                                <i data-lucide="user-voice" class="w-5 h-5"></i>
                                <label class="text-sm">發言者：</label>
                            </div>
                            <!-- 輸入框與清除按鈕 -->
                            <div class="relative flex-1 flex items-center group">
                                <input 
                                    type="text" 
                                    id="speaker-input" 
                                    placeholder="輸入講者名字 (按 Enter 確認)" 
                                    class="flex-1 w-full bg-white border border-indigo-200 rounded-xl pl-3 pr-10 py-2 text-sm text-slate-800 font-medium focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all placeholder:text-slate-400 placeholder:font-normal"
                                >
                                <!-- 一鍵清空按鈕 -->
                                <button id="btn-clear-speaker" class="absolute right-2 p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors hidden-view" title="清除目前講者">
                                    <i data-lucide="x" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <button id="btn-add-speaker" class="px-4 py-2 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-sm active:scale-95 whitespace-nowrap">
                                鎖定
                            </button>
                        </div>
                        
                        <!-- 歷史講者快捷鍵區 (Chips) -->
                        <div class="flex flex-wrap gap-2 items-center min-h-[28px]" id="speaker-chips-container">
                            <span class="text-xs text-indigo-400 font-medium mr-1"><i data-lucide="history" class="w-3 h-3 inline pb-0.5"></i> 快捷點選：</span>
                            <span class="text-xs text-slate-400 italic" id="no-speaker-hint">尚未輸入</span>
                            <!-- 動態生成的快捷按鈕會出現在這裡 -->
                        </div>
                    </div>

                    <!-- 即時動態字幕顯示區 -->
                    <div class="w-full bg-white border border-slate-200 rounded-2xl p-4 mb-6 h-48 overflow-y-auto flex flex-col shadow-inner">
                        <div class="text-xs text-slate-400 mb-2 font-medium flex items-center gap-1 sticky top-0 bg-white/90 backdrop-blur-sm pb-1">
                            <i data-lucide="message-square-dashed" class="w-3 h-3"></i> 即時語音辨識預覽 (AI 分析時會自動精準校正)
                        </div>
                        <p id="live-final-text" class="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap"></p>
                        <p id="live-interim-text" class="text-slate-400 text-sm leading-relaxed italic mt-1"></p>
                    </div>

                    <!-- 控制按鈕 -->
                    <div class="flex gap-4 w-full">
                        <button id="btn-pause-resume" class="flex-1 py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 bg-slate-100 text-slate-700 hover:bg-slate-200 active:scale-95 transition-all">
                            <i id="icon-pause-resume" data-lucide="pause" class="w-5 h-5"></i>
                            <span id="text-pause-resume">暫停錄音</span>
                        </button>
                        <button id="btn-stop-analyze" class="flex-1 py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white hover:from-indigo-700 hover:to-purple-700 shadow-lg shadow-indigo-200 active:scale-95 transition-all">
                            <i data-lucide="sparkles" class="w-5 h-5"></i>
                            <span>結束並分析</span>
                        </button>
                    </div>
                </div>

                <!-- === 上傳面板 === -->
                <div id="panel-upload" class="hidden-view flex flex-col items-center w-full">
                    <div id="upload-zone" class="w-full max-w-sm border-2 border-dashed border-indigo-200 rounded-3xl p-10 flex flex-col items-center justify-center text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/50 transition-all group bg-white">
                        <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mb-5 group-hover:scale-110 transition-transform duration-300">
                            <i data-lucide="file-audio" class="w-10 h-10"></i>
                        </div>
                        <h3 class="font-bold text-slate-700 mb-2 text-lg">選擇或拖曳音訊檔案</h3>
                        <p class="text-sm text-slate-500 mb-6 px-4">支援 iPhone 語音備忘錄 (.m4a), mp3, wav<br><span class="text-indigo-500 font-medium">檔案上限限制：20 MB</span></p>
                        <span class="px-8 py-3 bg-indigo-600 text-white text-sm font-bold rounded-full shadow-md shadow-indigo-200 group-hover:bg-indigo-700 transition-colors">
                            瀏覽檔案
                        </span>
                        <input type="file" id="file-input" accept="audio/*,.m4a,.mp4,.wav,.mp3" class="hidden" />
                    </div>
                </div>
            </div>
        </div>

        <!-- 處理中狀態 -->
        <div id="process-view" class="hidden-view flex flex-col items-center justify-center py-20 px-4 bg-white rounded-3xl shadow-sm border border-slate-100">
            <div class="w-24 h-24 bg-gradient-to-tr from-indigo-100 to-purple-100 rounded-[2rem] flex items-center justify-center mb-6 shadow-inner relative overflow-hidden">
               <div class="absolute inset-0 bg-gradient-to-tr from-indigo-200 to-purple-200 opacity-40 animate-pulse"></div>
               <i data-lucide="loader-2" class="w-10 h-10 text-indigo-600 animate-spin relative z-10"></i>
            </div>
            <h3 class="text-xl font-extrabold text-slate-800 mb-2">精靈分析中...</h3>
            <p id="process-status-text" class="text-slate-500 text-center max-w-sm font-medium">正在深度比對聲紋與精準校對文字，請稍候...</p>
        </div>

        <!-- 結果展示區 -->
        <div id="result-view" class="hidden-view space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
            
            <!-- 總結卡片 -->
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-3xl p-[3px] shadow-xl shadow-indigo-200/50">
                <div class="bg-white rounded-[21px] p-6 sm:p-8 h-full">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl">
                            <i data-lucide="check-circle-2" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">會議總結</h2>
                    </div>
                    <p id="summary-text" class="text-slate-700 leading-relaxed text-lg font-medium"></p>
                </div>
            </div>

            <!-- 待辦事項 -->
            <div id="action-items-container" class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2.5 bg-amber-50 text-amber-600 rounded-xl">
                        <i data-lucide="list-todo" class="w-6 h-6"></i>
                    </div>
                    <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">待辦事項 (Action Items)</h2>
                </div>
                <ul id="action-items-list" class="space-y-3">
                    <!-- 動態載入待辦事項 -->
                </ul>
            </div>

            <!-- 逐字稿 -->
            <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2.5 bg-emerald-50 text-emerald-600 rounded-xl">
                        <i data-lucide="message-square-quote" class="w-6 h-6"></i>
                    </div>
                    <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">智慧逐字稿 (高準確校正版)</h2>
                </div>
                
                <div id="transcript-list" class="space-y-6">
                    <!-- 動態載入逐字稿 -->
                </div>
            </div>
            
        </div>

    </main>

    <!-- 主程式邏輯 -->
    <script>
        // 初始化圖示
        lucide.createIcons();

        // -------------------------
        // 變數與 API 設置
        // -------------------------
        
        // ⚠️ 您的舊金鑰已被 Google 安全封鎖，請填入「全新申請」的金鑰
        const apiKey = "AIzaSyAaRFGQt5r3xZhdCmY_gxgEyaRfcHpN9vc"; // <--- 1. 【請在這裡填入您的新 API KEY】 !!! (例如 "AIzaSy...")
        
        // 錄音相關變數
        let isRecording = false;
        let isPaused = false;
        let recordingTime = 0;
        let timerInterval = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioStream = null;

        // 即時語音辨識與講者標籤
        let recognition = null;
        let finalLiveText = '';
        let activeSpeaker = ''; // 目前鎖定的發言者
        let speakerHistory = new Set(); // 歷史發言者紀錄

        // DOM 元素 - 版面
        const tabRecord = document.getElementById('tab-record');
        const tabUpload = document.getElementById('tab-upload');
        const tabsContainer = document.getElementById('tabs-container');
        const panelRecordStart = document.getElementById('panel-record-start');
        const panelRecordingDashboard = document.getElementById('panel-recording-dashboard');
        const panelUpload = document.getElementById('panel-upload');
        const inputView = document.getElementById('input-view');
        const processView = document.getElementById('process-view');
        const resultView = document.getElementById('result-view');
        
        // DOM 元素 - 按鈕與狀態
        const btnStartRecord = document.getElementById('btn-start-record');
        const btnPauseResume = document.getElementById('btn-pause-resume');
        const btnStopAnalyze = document.getElementById('btn-stop-analyze');
        const iconPauseResume = document.getElementById('icon-pause-resume');
        const textPauseResume = document.getElementById('text-pause-resume');
        const recordIndicator = document.getElementById('record-indicator');
        const recordStatusText = document.getElementById('record-status-text');
        const recordTime = document.getElementById('record-time');
        
        // DOM 元素 - 講者標註
        const speakerInput = document.getElementById('speaker-input');
        const btnClearSpeaker = document.getElementById('btn-clear-speaker');
        const btnAddSpeaker = document.getElementById('btn-add-speaker');
        const speakerChipsContainer = document.getElementById('speaker-chips-container');
        const noSpeakerHint = document.getElementById('no-speaker-hint');
        
        // DOM 元素 - 其他
        const liveFinalText = document.getElementById('live-final-text');
        const liveInterimText = document.getElementById('live-interim-text');
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const errorBox = document.getElementById('error-box');
        const errorText = document.getElementById('error-text');
        const processStatusText = document.getElementById('process-status-text');
        const btnReset = document.getElementById('btn-reset');

        // -------------------------
        // 講者標註邏輯 (一鍵清空 + 歷史 Chips)
        // -------------------------
        function updateActiveSpeaker(name) {
            activeSpeaker = name.trim();
            speakerInput.value = activeSpeaker;
            
            if (activeSpeaker) {
                // 如果有輸入名稱
                btnClearSpeaker.classList.remove('hidden-view');
                speakerHistory.add(activeSpeaker);
            } else {
                // 如果清空
                btnClearSpeaker.classList.add('hidden-view');
            }
            renderSpeakerChips();
        }

        function renderSpeakerChips() {
            // 先清除舊的按鈕
            const oldChips = speakerChipsContainer.querySelectorAll('.speaker-chip');
            oldChips.forEach(chip => chip.remove());

            if (speakerHistory.size > 0) {
                noSpeakerHint.classList.add('hidden-view');
            }

            // 重新渲染歷史清單
            speakerHistory.forEach(name => {
                const btn = document.createElement('button');
                const isActive = (name === activeSpeaker);
                
                // 動態決定按鈕樣式 (選中 / 未選中)
                btn.className = `speaker-chip px-3 py-1.5 rounded-xl text-xs font-bold shadow-sm transition-all focus:outline-none ${
                    isActive 
                    ? 'bg-indigo-600 text-white scale-105 shadow-indigo-200' 
                    : 'bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 active:scale-95'
                }`;
                btn.textContent = name;
                btn.onclick = () => updateActiveSpeaker(name); // 點擊直接切換
                speakerChipsContainer.appendChild(btn);
            });
        }

        // 綁定標註事件
        btnAddSpeaker.onclick = () => updateActiveSpeaker(speakerInput.value);
        speakerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateActiveSpeaker(speakerInput.value);
        });
        btnClearSpeaker.onclick = () => {
            updateActiveSpeaker('');
            speakerInput.focus(); // 清空後自動聚焦方便下次打字
        };

        // -------------------------
        // 初始化即時語音辨識 (瀏覽器內建)
        // -------------------------
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'zh-TW'; 

                recognition.onresult = (event) => {
                    if(isPaused) return; 
                    
                    let interimTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            // 擷取目前鎖定的講者
                            const speakerTag = activeSpeaker ? `[${activeSpeaker}]: ` : '';
                            finalLiveText += speakerTag + event.results[i][0].transcript + '\n';
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }
                    liveFinalText.textContent = finalLiveText;
                    
                    // 動態文字加上名字前綴 (視覺體驗更好)
                    const tempTag = activeSpeaker ? `[${activeSpeaker}]: ` : '';
                    liveInterimText.textContent = interimTranscript ? tempTag + interimTranscript : '';
                    
                    // 自動滾動到底部
                    const liveBox = liveFinalText.parentElement;
                    liveBox.scrollTop = liveBox.scrollHeight;
                };

                recognition.onend = () => {
                    if (isRecording && !isPaused) {
                        try { recognition.start(); } catch(e) {}
                    }
                };
            }
        }
        initSpeechRecognition();

        // -------------------------
        // UI 輔助功能
        // -------------------------
        function showError(msg) {
            if (msg) {
                errorText.textContent = msg;
                errorBox.classList.remove('hidden-view');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                errorBox.classList.add('hidden-view');
            }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function switchTab(tab) {
            if (isRecording) return; 
            showError('');

            if (tab === 'record') {
                tabRecord.className = "flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors text-indigo-600 border-b-2 border-indigo-600 bg-white";
                tabUpload.className = "flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors text-slate-500 hover:bg-slate-50";
                panelRecordStart.classList.remove('hidden-view');
                panelRecordingDashboard.classList.add('hidden-view');
                panelUpload.classList.add('hidden-view');
            } else {
                tabUpload.className = "flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors text-indigo-600 border-b-2 border-indigo-600 bg-white";
                tabRecord.className = "flex-1 py-4 text-sm font-bold flex items-center justify-center gap-2 transition-colors text-slate-500 hover:bg-slate-50";
                panelUpload.classList.remove('hidden-view');
                panelRecordStart.classList.add('hidden-view');
                panelRecordingDashboard.classList.add('hidden-view');
            }
        }

        function updateRecordingUI() {
            if (isPaused) {
                recordIndicator.classList.remove('animate-pulse', 'bg-red-500', 'shadow-red-200');
                recordIndicator.classList.add('bg-slate-400');
                recordStatusText.textContent = '錄音已暫停';
                recordStatusText.classList.replace('text-red-500', 'text-slate-500');
                
                iconPauseResume.setAttribute('data-lucide', 'play');
                textPauseResume.textContent = '繼續錄音';
                btnPauseResume.classList.replace('bg-slate-100', 'bg-indigo-100');
                btnPauseResume.classList.replace('text-slate-700', 'text-indigo-700');
            } else {
                recordIndicator.classList.add('animate-pulse', 'bg-red-500', 'shadow-red-200');
                recordIndicator.classList.remove('bg-slate-400');
                recordStatusText.textContent = '正在錄音中...';
                recordStatusText.classList.replace('text-slate-500', 'text-red-500');
                
                iconPauseResume.setAttribute('data-lucide', 'pause');
                textPauseResume.textContent = '暫停錄音';
                btnPauseResume.classList.replace('bg-indigo-100', 'bg-slate-100');
                btnPauseResume.classList.replace('text-indigo-700', 'text-slate-700');
            }
            lucide.createIcons();
        }

        function showProcessView(statusMsg) {
            showError('');
            inputView.classList.add('hidden-view');
            resultView.classList.add('hidden-view');
            processView.classList.remove('hidden-view');
            processStatusText.textContent = statusMsg;
        }

        // -------------------------
        // 錄音與控制邏輯
        // -------------------------
        async function startRecording() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(audioStream);
                audioChunks = [];
                
                // 重置狀態
                finalLiveText = ''; 
                liveFinalText.textContent = '';
                liveInterimText.textContent = '';
                speakerHistory.clear();
                updateActiveSpeaker('');

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    handleAudioProcessing(audioBlob);
                    if (audioStream) {
                        audioStream.getTracks().forEach(track => track.stop());
                    }
                };

                mediaRecorder.start();
                if (recognition) {
                    try { recognition.start(); } catch(e) {}
                }
                
                isRecording = true;
                isPaused = false;
                recordingTime = 0;
                recordTime.textContent = formatTime(0);
                
                panelRecordStart.classList.add('hidden-view');
                panelRecordingDashboard.classList.remove('hidden-view');
                tabsContainer.classList.add('opacity-50', 'pointer-events-none'); 
                
                updateRecordingUI();
                showError('');

                timerInterval = setInterval(() => {
                    if (!isPaused) {
                        recordingTime++;
                        recordTime.textContent = formatTime(recordingTime);
                    }
                }, 1000);

            } catch (err) {
                showError('無法存取麥克風，請確保已授予權限。');
                console.error('Error accessing microphone:', err);
            }
        }

        function togglePauseResume() {
            if (!mediaRecorder || !isRecording) return;
            if (isPaused) {
                mediaRecorder.resume();
                if (recognition) { try { recognition.start(); } catch(e) {} }
                isPaused = false;
            } else {
                mediaRecorder.pause();
                if (recognition) { recognition.stop(); }
                isPaused = true;
                liveInterimText.textContent = ''; 
            }
            updateRecordingUI();
        }

        function stopAndAnalyze() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop(); 
                if (recognition) {
                    recognition.onend = null; 
                    recognition.stop();
                }
                isRecording = false;
                clearInterval(timerInterval);
                tabsContainer.classList.remove('opacity-50', 'pointer-events-none'); 
            }
        }

        // -------------------------
        // 檔案與 AI 處理
        // -------------------------
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 放寬檔案類型檢查，避免擋住 iOS 的 m4a 語音備忘錄
            const validExtensions = ['.m4a', '.mp3', '.wav', '.ogg', '.aac', '.flac', '.webm', '.mp4'];
            const fileName = file.name ? file.name.toLowerCase() : '';
            const hasValidExtension = validExtensions.some(ext => fileName.endsWith(ext));
            const isAudioType = file.type.startsWith('audio/') || file.type === 'video/mp4';

            if (!isAudioType && !hasValidExtension) {
                showError('請上傳有效的音訊檔案 (例如 mp3, m4a, wav)。');
                return;
            }

            // 放寬至 20MB
            const maxSizeMB = 20;
            if (file.size > maxSizeMB * 1024 * 1024) {
                showError(`檔案過大。受限於 API 架構限制，請上傳小於 ${maxSizeMB}MB 的音檔。`);
                return;
            }
            
            finalLiveText = ''; 
            handleAudioProcessing(file);
        }

        function handleAudioProcessing(audioBlobOrFile) {
            showProcessView('正在讀取音檔...');
            
            const reader = new FileReader();
            reader.readAsDataURL(audioBlobOrFile);
            reader.onloadend = async () => {
                const base64data = reader.result.split(',')[1];
                let mimeType = audioBlobOrFile.type;
                
                // 修正 iOS m4a 或空白 MIME type 的問題，確保 API 接受
                if (mimeType === 'audio/x-m4a') mimeType = 'audio/mp4';
                if (mimeType === 'audio/x-wav') mimeType = 'audio/wav';
                
                if (!mimeType || mimeType === 'video/mp4' || mimeType === 'application/mp4') {
                    if (audioBlobOrFile.name && audioBlobOrFile.name.toLowerCase().endsWith('.m4a')) {
                        mimeType = 'audio/mp4';
                    } else if (audioBlobOrFile.name && audioBlobOrFile.name.toLowerCase().endsWith('.wav')) {
                        mimeType = 'audio/wav';
                    } else {
                        mimeType = 'audio/mp3'; // 預設安全 fallback
                    }
                }
                
                await analyzeAudioWithAI(base64data, mimeType);
            };
            reader.onerror = () => {
                resetApp(true);
                showError('讀取檔案失敗');
            };
        }

        async function analyzeAudioWithAI(base64Audio, mimeType) {
            processStatusText.textContent = '吳博精靈正在深度比對聲紋與精準校對文字... (需時幾十秒)';
            
            let prompt = `你是一個頂級的「專業會議記錄員」與「語音分析專家」。請仔細聆聽這段會議音檔，並嚴格執行以下任務：

【核心任務一：前後文語意校正與高精準聽寫】
1. **上下文自動修正**：請「極度仔細」地聆聽音檔。轉換文字時，**絕對要根據前後文的邏輯與語意，自動修正同音異字、口誤或含糊不清的詞彙**。
2. **在地化與流暢度**：將內容轉換為「繁體中文 (台灣)」的逐字稿。請適度去除過多的無意義語氣詞（如：呃、嗯、那個），讓語句通順、精確且符合專業會議水準。

【核心任務二：高精準聲紋辨識 (Speaker Diarization)】
1. **特徵拆解**：請仔細分辨不同人的音色（低沉/高亢、男聲/女聲）、說話節奏與口音。
2. **疊話與附和處理**：即使遇到多人同時說話（疊話），或是極短的附和（如「對」、「好」、「沒錯」），都必須嚴格切分成獨立的發言段落，絕不能把兩人的聲音混在同一段文字裡。`;

            // 動態判斷：只有在「即時錄音」且有生成草稿時，才給 AI 綁定名字的指令
            if (finalLiveText && finalLiveText.trim().length > 0) {
                prompt += `
3. 我們會提供一份「即時語音草稿」。請注意：這份草稿是由準確率普通的即時系統生成的，裡面含有大量錯字。**請務必以您實際聽到的「音檔內容」為絕對準則進行聽寫，切勿盲目照抄草稿**。
4. 草稿的唯一用途是「聲紋綁定」。在草稿中，有些句子前方帶有 \`[XXX]:\` 的標籤，這是使用者手動輸入的名字。請將該標籤對應的「聲音特徵」與「名字」綁定。當該聲音在音檔中再次出現時，請自動辨識並**直接套用該名字（例如：「王總」、「李經理」）**。
5. 遇到未被使用者標註過的新聲音，再以預設的「講者 A」、「講者 B」等代稱。`;
            } else {
                prompt += `
3. 請根據聲音特徵，自動將不同說話者分類為「講者 A」、「講者 B」、「講者 C」等。
4. 如果只有一個人說話，請單純標示為「講者」。`;
            }

            prompt += `

任務清單：
1. 產出高精準度、語意通順的繁體中文逐字稿，並嚴格標示每句話的說話者。
2. 撰寫一段簡明扼要的「會議總結」。
3. 條列出會議中提到的「待辦事項 (Action Items)」，若無則留空陣列。`;

            if (finalLiveText && finalLiveText.trim().length > 0) {
                prompt += `\n\n【使用者即時標註草稿參考 (警告：僅供講者標籤對應，內文可能有大量錯字，請以音檔為主)】\n"""\n${finalLiveText}\n"""`;
            }

            prompt += `\n\n請務必以嚴格的 JSON 格式回傳，格式定義如下：
{
  "summary": "這裡填寫整體的會議總結...",
  "actionItems": ["待辦事項1", "待辦事項2"],
  "transcript": [
    { "speaker": "講者名稱", "text": "精準且語意通順的對話內容..." },
    { "speaker": "講者名稱", "text": "好的，我認為..." },
    { "speaker": "講者名稱", "text": "對，就照這樣做。" }
  ]
}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: mimeType, data: base64Audio } }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            let attempt = 0;
            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];
            let targetModel = "gemini-2.5-flash-preview-09-2025";

            while (attempt <= maxRetries) {
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        }
                    );

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        const errMsg = errorData.error?.message || '未知錯誤';
                        if (response.status === 404 || response.status === 403) {
                            targetModel = "gemini-2.5-flash"; 
                        }
                        throw new Error(`API 錯誤 (${response.status}): ${errMsg}`);
                    }

                    const data = await response.json();
                    const textContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!textContent) throw new Error('AI 回傳格式異常');

                    let cleanText = textContent.trim();
                    const mdBlock = String.fromCharCode(96, 96, 96);
                    if (cleanText.startsWith(mdBlock)) {
                        const startRegex = new RegExp('^' + mdBlock + '(?:json)?\\n?', 'i');
                        cleanText = cleanText.replace(startRegex, '');
                        const endRegex = new RegExp('\\n?' + mdBlock + '$', 'i');
                        cleanText = cleanText.replace(endRegex, '');
                        cleanText = cleanText.trim();
                    }

                    const parsedResult = JSON.parse(cleanText);
                    renderResult(parsedResult);
                    return;

                } catch (err) {
                    attempt++;
                    if (attempt > maxRetries) {
                        resetApp(true); // 保留錯誤訊息，不讓它被瞬間清空
                        if (!apiKey || apiKey === "") {
                            showError('⚠️ 缺少 API Key！請打開網頁原始碼，在「const apiKey = "";」中填入您的金鑰。');
                        } else {
                            showError(`AI 處理失敗，請稍後再試。(${err.message})`);
                        }
                        return;
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[attempt - 1]));
                }
            }
        }

        // -------------------------
        // 渲染結果 UI
        // -------------------------
        function renderResult(data) {
            processView.classList.add('hidden-view');
            inputView.classList.add('hidden-view');
            resultView.classList.remove('hidden-view');
            btnReset.classList.remove('hidden-view');

            document.getElementById('summary-text').textContent = data.summary;

            const actionContainer = document.getElementById('action-items-container');
            const actionList = document.getElementById('action-items-list');
            if (data.actionItems && data.actionItems.length > 0) {
                actionContainer.classList.remove('hidden-view');
                actionList.innerHTML = data.actionItems.map((item, idx) => `
                    <li class="flex items-start gap-3 bg-amber-50/50 p-4 rounded-2xl border border-amber-100/50">
                        <div class="w-7 h-7 rounded-full bg-amber-200 text-amber-700 flex items-center justify-center text-sm font-extrabold shrink-0 mt-0.5 shadow-sm">
                            ${idx + 1}
                        </div>
                        <span class="text-slate-700 leading-relaxed font-medium">${escapeHtml(item)}</span>
                    </li>
                `).join('');
            } else {
                actionContainer.classList.add('hidden-view');
            }

            const transcriptList = document.getElementById('transcript-list');
            const uniqueSpeakers = [...new Set(data.transcript.map(line => line.speaker))];
            
            transcriptList.innerHTML = data.transcript.map((line, idx) => {
                const isSpeakerA = line.speaker === uniqueSpeakers[0] || idx % 2 === 0;
                const alignClass = isSpeakerA ? 'items-start' : 'items-end';
                const isDefaultName = line.speaker.includes('講者');
                
                const bubbleClass = isSpeakerA 
                    ? (isDefaultName ? 'bg-slate-100 text-slate-800 rounded-tl-sm' : 'bg-indigo-50 text-indigo-900 border border-indigo-100 rounded-tl-sm')
                    : (isDefaultName ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-emerald-600 text-white rounded-tr-sm');
                
                const nameStyle = isDefaultName ? "font-medium text-slate-400" : "font-extrabold text-indigo-600";
                
                return `
                    <div class="flex flex-col ${alignClass}">
                        <span class="text-xs mb-1 px-2 ${nameStyle}">
                            ${escapeHtml(line.speaker)}
                        </span>
                        <div class="px-5 py-3.5 rounded-2xl max-w-[85%] sm:max-w-[75%] shadow-sm ${bubbleClass}">
                            <p class="leading-relaxed">${escapeHtml(line.text)}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function resetApp(keepError = false) {
            if (!keepError) {
                showError('');
            }
            resultView.classList.add('hidden-view');
            processView.classList.add('hidden-view');
            btnReset.classList.add('hidden-view');
            inputView.classList.remove('hidden-view');
            
            panelRecordingDashboard.classList.add('hidden-view');
            panelRecordStart.classList.remove('hidden-view');
            tabsContainer.classList.remove('opacity-50', 'pointer-events-none');
            
            if (isRecording) {
                if (mediaRecorder) mediaRecorder.stop();
                if (recognition) recognition.stop();
                isRecording = false;
            }
            recordingTime = 0;
            fileInput.value = ""; 
            updateActiveSpeaker('');
            speakerHistory.clear();
            renderSpeakerChips();
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // -------------------------
        // 綁定事件監聽器
        // -------------------------
        tabRecord.addEventListener('click', () => switchTab('record'));
        tabUpload.addEventListener('click', () => switchTab('upload'));
        
        btnStartRecord.addEventListener('click', startRecording);
        btnPauseResume.addEventListener('click', togglePauseResume);
        btnStopAnalyze.addEventListener('click', stopAndAnalyze);

        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileUpload);
        btnReset.addEventListener('click', resetApp);

    </script>
</body>
