            if (typeof num === 'string' && !/^-?\d/.test(num)) return num;
            if (num === '∞' || num === '-') return num;
            if (num === null || num === undefined || num === '') return "";
            const n = Number(num);
            if (isNaN(n)) return num; 
            return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        const extractDatesFromSchedule = (scheduleStr) => {

            const matches = []; let match;
            while ((match = regex.exec(scheduleStr)) !== null) {
                const d = new Date(match[0].replace(/\//g, '-')); 
                if (!isNaN(d.getTime())) matches.push(d);
            }
            return matches;
        };
        
        const sortScheduleLines = (lines) => {

                if (dateA && dateB) return dateA - dateB; if (dateA) return -1; if (dateB) return 1; return 0;

        const getPaymentStatus = (record) => {

        // 修正：外在本金計算公式，確保最小值為0
        const calculateDerivedData = (record) => {
            const loanAmount = Number(record.loanAmount) || 0; 
            const disbursed = Number(record.disbursed) || 0;
            
            const entries = parseSchedule(record.schedule);
            let totalPrincipalPaid = 0;
            let totalInterestPaid = 0;
            
            entries.forEach(e => {
                totalPrincipalPaid += e.principal;
                totalInterestPaid += e.interest;
            });

            // 狀態4：已結案呆帳
            if (record.status === '4') {
                let outstanding = record.outstandingPrincipal !== undefined ? Number(record.outstandingPrincipal) : (disbursed - totalPrincipalPaid - totalInterestPaid);
                let arrears = record.arrears !== undefined ? Number(record.arrears) : (loanAmount - totalPrincipalPaid);
                
                // 確保最小值為0
                outstanding = Math.max(0, outstanding);
                arrears = Math.max(0, arrears);
                
                return {
                    outstanding,
                    arrears,
                    remainingTerms: '-', 
                    roiTerms: '-',
                    totalPrincipalPaid,
                    totalInterestPaid
                };
            }

            // 狀態0：已結案、狀態2：代管中
            if (record.status === '0' || record.status === '2') {
                let outstanding = 0;
                let arrears = record.status === '0' ? 0 : (loanAmount - totalPrincipalPaid);
                
                // 確保最小值為0
                arrears = Math.max(0, arrears);
                
                return { 
                    outstanding,
                    arrears,
                    remainingTerms: '-', 
                    roiTerms: '-',
                    totalPrincipalPaid,
                    totalInterestPaid
                };
            }

            // 狀態5：協商中
            if (record.status === '5') {
                const negotiationPrincipal = Number(record.negotiationPrincipal) || 0;
                const totalNegotiationPaid = entries.reduce((sum, e) => sum + e.principal, 0);
                const totalInterestPaid = entries.reduce((sum, e) => sum + e.interest, 0); // 累計歷史利息收入
                
                let outstanding = disbursed - totalNegotiationPaid - totalInterestPaid;
                let arrears = loanAmount - totalNegotiationPaid;
                
                // 確保最小值為0
                outstanding = Math.max(0, outstanding);
                arrears = Math.max(0, arrears);
                
                let remainingTerms = '-';
                if (negotiationPrincipal > 0 && arrears > 0) {
                    remainingTerms = Math.ceil(arrears / negotiationPrincipal);
                }
                
                return { 
                    outstanding, 
                    arrears, 
                    remainingTerms, 
                    roiTerms: remainingTerms,
                    totalPrincipalPaid: totalNegotiationPaid,
                    totalInterestPaid: totalInterestPaid, // 保留歷史利息收入
                    isNegotiation: true,
                    negotiationPrincipal
                };
            }

            // 狀態1、3：進行中或呆帳
            let outstanding = disbursed - totalPrincipalPaid - totalInterestPaid;
            let arrears = loanAmount - totalPrincipalPaid;
            
            // 確保最小值為0
            outstanding = Math.max(0, outstanding);
            arrears = Math.max(0, arrears);

            let remainingTerms = '-'; 
            let roiTerms = "-";
            const method = record.method || ''; 
            const isSpecialMethod = ['設定', '票貼', '小額'].includes(method);
            
            if (!isSpecialMethod) {
                const terms = Number(record.terms) || 0; 
                const repaidTerms = entries.length;
                let val = terms - repaidTerms; 
                if (val < 0) val = 0; 
                remainingTerms = Math.floor(val); 
                
                const termPrincipal = Number(record.principalPerTerm) || 0; 
                const termInterest = Number(record.interestPerTerm) || 0; 
                const termTotal = termPrincipal + termInterest;
                
                if (record.status === '3') {
                    roiTerms = "∞"; 
                } else if (record.status === '1') { 
                    if (termTotal > 0 && outstanding > 0) { 
                        let val = outstanding / termTotal; 
                        if (val < 0) val = 0; 
                        if (val === Infinity) {
                            roiTerms = "∞";
                        } else {
                            roiTerms = Math.ceil(val);
                        }
                    } else if (outstanding <= 0) {
                        roiTerms = "0"; 
                    }
                }
            }
            
            return { outstanding, arrears, remainingTerms, roiTerms, totalPrincipalPaid, totalInterestPaid };
        };

                // 狀態5：協商案件
                if (r.status === '5') {
                    // 債權總額：只計算狀態1、3、5的欠款
                    s.creditAmount += calc.arrears;
                    
                    // 目前放款額度：只計算狀態1、3、5的借款金額
                    s.currentLent += Number(r.loanAmount) || 0;
                    
                    // 在外本金：只計算狀態1、3、5
                    s.outstanding += calc.outstanding;
                    
                    // 協商應收款
                    s.negotiationDue += negotiationPrincipal;
                    
                    // 從還款日程中提取本月已還的協商本金
                    const entries = parseSchedule(r.schedule);
                    const currentMonthPaid = entries
                        .filter(e => e.date && e.date.getFullYear() === currentYear && e.date.getMonth() === currentMonth)
                        .reduce((sum, e) => sum + e.principal, 0);
                    
                    // 協商已收款
                    s.negotiationCollected += currentMonthPaid;
                    
                    // 將協商應收款計入本月應收款總和
                    s.monthDue += negotiationPrincipal;
                    // 將協商已收款計入本月實際已收款總和
                    s.monthActualCollected += currentMonthPaid;
                    
                    // 呆帳金額（協商案件也計入呆帳金額）
                    s.badDebtAmount += calc.arrears;
                    s.activeBadDebtCount++;
                    s.badDebtCases.push(r);
                    s.negotiationCases++;
                    s.negotiationRecords.push(r);
                    
                    // 如果未繳款，則計入本月款差
                    const { isPaid } = getPaymentStatus(r);
                    if (!isPaid) {
                        s.monthDiff += negotiationPrincipal;
                    }
                }
                // 狀態1、3：正常案件、呆帳
                else if (r.status === '1' || r.status === '3') {
                     // 債權總額：只計算狀態1、3、5的欠款
                     s.creditAmount += calc.arrears;
                     
                     // 目前放款額度：只計算狀態1、3、5的借款金額
                     s.currentLent += Number(r.loanAmount) || 0;
                     
                     // 在外本金：只計算狀態1、3、5
                     s.outstanding += calc.outstanding;
                     
                     if (r.status === '1') {
                         s.monthDue += (principal + termInterest);
                         s.monthInterestDue += termInterest;
                     }
                     
                     // 呆帳金額
                     if (r.status === '3') {
                         s.badDebtAmount += calc.arrears;
                         s.activeBadDebtCount++;
                         s.badDebtCases.push(r);
                     }
                }
                // 狀態4：已結案呆帳
                else if (r.status === '4') {
                     // 債權總額：狀態4不計入
                     // 目前放款額度：狀態4不計入
                     // 在外本金：狀態4不計入（已結案）
                     s.badDebtAmount += calc.arrears;
                     s.closedBadDebtCount++;
                     s.badDebtCases.push(r);
                }
                // 狀態2：代管案件
                else if (r.status === '2') {
                    // 代管案件不計入在外本金和目前放款額
                    s.monthDue += termInterest;
                    s.monthInterestDue += termInterest;
                    s.hasManagedCases = true;
                    s.totalManagementFee += termInterest;
                    s.managedCases++;
                    s.managedRecords.push(r);
                }

                // 案件計數
                if (r.status === '0') {
                    s.normalClosedCount++; s.closedRecords.push(r);
                } else if (r.status === '1') {
                    s.activeCases++; s.activeRecords.push(r);
                    const { isOverdue, isPaid } = getPaymentStatus(r);
                    if (isOverdue) { s.unpaidCount++; s.unpaidRecords.push(r); }
                } else if (r.status === '2') {
                     const { isPaid } = getPaymentStatus(r);
                     if (!isPaid) {
                        s.monthDiff += termInterest;
                        s.monthInterestDiff += termInterest;
                     }
                }

                // 計算本月實際已收款和本月實際已收息（從還款日程中提取，只計算當月）
                if (r.status === '1' || r.status === '2' || r.status === '5') {
                    const entries = parseSchedule(r.schedule);
                    const currentMonthEntries = entries.filter(e => 
                        e.date && e.date.getFullYear() === currentYear && e.date.getMonth() === currentMonth
                    );
                    
                    currentMonthEntries.forEach(e => {
                        s.monthActualCollected += e.principal + e.interest;
                        s.monthActualInterestCollected += e.interest;
                    });
                }

                if (r.borrower) uniqueBorrowers.add(r.borrower);
            });

            s.borrowers = uniqueBorrowers.size;
            
            // 計算淨收入：總收入 - 呆帳金額
            s.netIncome = s.totalIncome - s.badDebtAmount;
            
            // 計算本月款差（應收款 - 本月實際已收款，排除追繳款項）
            s.monthDiff = s.monthDue - s.monthActualCollected;
            if (s.monthDiff < 0) s.monthDiff = 0;
            
            // 計算本月息差（應收息 - 本月實際已收息，排除追繳款項）
            s.monthInterestDiff = s.monthInterestDue - s.monthActualInterestCollected;
            if (s.monthInterestDiff < 0) s.monthInterestDiff = 0;
            
            // 本月已收款（顯示用，包括追繳款項）
            s.monthCollected = s.monthActualCollected;
            s.monthInterestCollected = s.monthActualInterestCollected;
            
            return s;
        };

        window.updateFormData = (key, val, shouldRender = false) => { 
            formData[key] = val; 
            const loan = Number(formData.loanAmount) || 0; 
            const t = Number(formData.terms) || 0; 
            const interestRate = (parseFloat(formData.interestRate) || 0) / 100; 
            const specialRate = (parseFloat(formData.specialRate) || 0) / 100; 

            // 如果狀態改為5，清除期數和利息相關欄位
            if (key === 'status' && val === '5') {
                formData.terms = '';
                formData.interestRate = '';
                formData.principalPerTerm = '';
                formData.interestPerTerm = '';
                formData.repayDay = '';
                formData.method = '叨簿子';
            }
            
            // 如果狀態從5改為其他，清除協商本金
            if (key === 'status' && val !== '5' && formData.status === '5') {
                formData.negotiationPrincipal = '';
            }

            if (key === 'loanAmount' || key === 'terms' || key === 'status' || key === 'method') { 
                if (formData.status === '2') { 
                    // 狀態2：代管案件
                    if (formData.method === '叨簿子') {
                        // 叨簿子：應付 = (借款利率-利率)*借款金額 + 借款金額/期數
                        const principalPerTerm = t > 0 ? Math.round(loan / t) : 0;
                        const interestToClient = Math.round(loan * (specialRate - interestRate));
                        // 管理費 = 借款金額 * 利率
                        const managementFee = Math.round(loan * interestRate);
                        formData.principalPerTerm = principalPerTerm;
                        formData.interestPerTerm = managementFee;
                        formData.expectedPayment = interestToClient + principalPerTerm;
                    } else {
                        // 非叨簿子：應付 = (借款利率-利率)*借款金額
                        const interestToClient = Math.round(loan * (specialRate - interestRate));
                        // 管理費 = 借款金額 * 利率
                        const managementFee = Math.round(loan * interestRate);
                        formData.principalPerTerm = 0;
                        formData.interestPerTerm = managementFee;
                        formData.expectedPayment = interestToClient;
                    }
                } 
                else if (formData.status === '5') {
                    // 狀態5：協商案件，不清算期數和利息，保持協商本金
                    formData.principalPerTerm = 0;
                    formData.interestPerTerm = 0;
                    formData.terms = 0;
                }
                else if ((formData.status === '1' || formData.method === '叨簿子') && t > 0) formData.principalPerTerm = Math.round(loan / t); 
                if (['設定', '票貼', '小額'].includes(formData.method)) { formData.principalPerTerm = 0; formData.terms = 0; } 
            } 
            
            if (key === 'status' || key === 'loanAmount' || key === 'interestRate' || key === 'specialRate') { 
                if (formData.status === '2') { 
                    // 重新計算狀態2的金額
                    const loan = Number(formData.loanAmount) || 0; 
                    const t = Number(formData.terms) || 0; 
                    const interestRate = (parseFloat(formData.interestRate) || 0) / 100; 
                    const specialRate = (parseFloat(formData.specialRate) || 0) / 100;
                    
                    if (formData.method === '叨簿子') {
                        const principalPerTerm = t > 0 ? Math.round(loan / t) : 0;
                        const interestToClient = Math.round(loan * (specialRate - interestRate));
                        const managementFee = Math.round(loan * interestRate);
                        formData.principalPerTerm = principalPerTerm;
                        formData.interestPerTerm = managementFee;
                        formData.expectedPayment = interestToClient + principalPerTerm;
                    } else {
                        const interestToClient = Math.round(loan * (specialRate - interestRate));
                        const managementFee = Math.round(loan * interestRate);
                        formData.principalPerTerm = 0;
                        formData.interestPerTerm = managementFee;
                        formData.expectedPayment = interestToClient;
                    }
                } 
                else if (formData.status !== '5') { 
                    formData.interestPerTerm = Math.round(loan * interestRate); 
                } 
            } 

            if (shouldRender) { renderApp(); } 
            else { 
                const setVal = (id, v) => { const el = document.getElementById(id); if(el) el.value = v; }; 
                const setText = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };

                if(formData.status === '2') {

        window.exportToExcel = () => {

                            // 狀態2顯示0，其他狀態顯示原始金額
                            value = record.status === '2' ? '0' : formatNumber(record.disbursed || 0);
                            break;
                        case '利率(%)':

                            break;

                            break;
                        case '每期利息':

        // Vertical CSV Import Logic
        const MAP_ROWS = {
            STATUS: 0,
            CATEGORY: 1,
            LOAN_DATE: 2,
            BORROWER: 3,
            JOB: 4,
            AMOUNT: 5,
            ACTUAL_AMOUNT: 6,
            INTEREST_RATE: 7,
            AGENT: 8,
            PERIODS: 9,
            RULE_DAY: 10,
            HISTORY_START: 11
        };
        
        const cleanNumber = (val) => val ? parseFloat(String(val).replace(/,/g, '').replace(/%/g, '').trim()) : 0;
        
        const parseCSV = (text) => {
            const rawRows = text.trim().split(/\r\n|\n/).filter(row => row.trim() !== '');
            
            const rows = rawRows.map(row => {
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < row.length; j++) {
                    const char = row[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                return values.map(v => v.replace(/^"(.*)"$/, '$1').replace(/""/g, '"'));
            });

            if (rows.length === 0) return [];
            
            const parsedCases = [];
            const totalCols = rows[0].length;
            const startingCol = 1;

            console.log(`CSV解析：總列數=${totalCols}, 從第${startingCol}列開始解析`);

            for (let col = startingCol; col < totalCols; col++) {
                const borrowerName = rows[MAP_ROWS.BORROWER]?.[col]?.trim();
                const loanAmount = cleanNumber(rows[MAP_ROWS.AMOUNT]?.[col]);
                
                if (!borrowerName && loanAmount === 0) {
                    console.log(`跳過第${col}列：無借款人名稱且借款金額為0`);
                    continue;
                }

                let status = String(rows[MAP_ROWS.STATUS]?.[col] || '1').trim();
                const terms = cleanNumber(rows[MAP_ROWS.PERIODS]?.[col]);
                const interestRateFloat = cleanNumber(rows[MAP_ROWS.INTEREST_RATE]?.[col]) / 100;

                if (!['0', '1', '2', '3', '4', '5'].includes(status)) {
                    const statusText = status.toLowerCase();
                    if (statusText.includes('進行') || statusText.includes('正常')) status = '1';
                    else if (statusText.includes('代管')) status = '2';
                    else if (statusText.includes('呆帳')) status = '3';
                    else if (statusText.includes('結案')) status = '0';
                    else if (statusText.includes('協商')) status = '5';
                    else status = '1';
                }

                let principalPerTerm = 0;
                let interestPerTerm = 0;
                let negotiationPrincipal = 0;
                
                if (status === '5') {
                    // 協商案件：設定協商本金
                    negotiationPrincipal = Math.round(loanAmount * 0.05);
                } else if (status !== '2' && terms > 0) {
                    principalPerTerm = Math.round(loanAmount / terms);
                }
                
                if (status !== '5') {
                    interestPerTerm = Math.round(loanAmount * interestRateFloat);
                }

                const scheduleLines = [];
                let lastRepaymentDate = '';

                const scheduleRowIndex = rows.findIndex(row => row[0]?.includes('還款日程'));
                if (scheduleRowIndex !== -1 && rows[scheduleRowIndex]?.[col]) {
                    const scheduleText = rows[scheduleRowIndex][col];
                    if (scheduleText) {
                        const scheduleEntries = scheduleText.split('|').map(entry => entry.trim());
                        scheduleEntries.forEach(entry => {
                            if (entry) {
                                const dateMatch = entry.match(/(\d{4}[-\/]\d{1,2}[-\/]\d{1,2})/);
                                const principalMatch = entry.match(/本金[:\s]*(\d+)/);
                                const interestMatch = entry.match(/利息[:\s]*(\d+)/);
                                
                                if (dateMatch) {
                                    const cleanDate = dateMatch[0].replace(/\//g, '-');
                                    const principal = principalMatch ? parseInt(principalMatch[1], 10) : (status === '5' ? negotiationPrincipal : principalPerTerm);
                                    const interest = interestMatch ? parseInt(interestMatch[1], 10) : interestPerTerm;
                                    scheduleLines.push(`${cleanDate} 本金:${principal} 利息:${interest}`);
                                }
                            }
                        });
                    }
                }
                
                if (scheduleLines.length === 0) {
                    for (let rowIdx = MAP_ROWS.HISTORY_START; rowIdx < rows.length; rowIdx++) {
                        const historyDateStr = rows[rowIdx]?.[col]?.trim();
                        if (historyDateStr && /\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(historyDateStr)) {
                            const cleanDate = historyDateStr.replace(/\//g, '-');
                            const entry = `${cleanDate} 本金:${status === '5' ? negotiationPrincipal : principalPerTerm} 利息:${interestPerTerm}`;
                            scheduleLines.push(entry);
                        }
                    }
                }
                
                const sortedSchedule = sortScheduleLines(scheduleLines).join('\n');
                const repaidTermsCount = extractDatesFromSchedule(sortedSchedule).length;
                const totalInterestIncome = status === '5' ? scheduleLines.reduce((sum, line) => {
                    const match = line.match(/利息:(\d+)/);
                    return sum + (match ? parseInt(match[1], 10) : 0);
                }, 0) : repaidTermsCount * interestPerTerm;
                
                if (repaidTermsCount > 0) {
                    const allDates = extractDatesFromSchedule(sortedSchedule);
                    allDates.sort((a, b) => b.getTime() - a.getTime());
                    if (allDates.length > 0) lastRepaymentDate = allDates[0].toISOString().split('T')[0];
                }

                // 修正：確保放款日期被正確解析
                let loanDate = rows[MAP_ROWS.LOAN_DATE]?.[col] || '';
                if (loanDate) {
                    const dateMatch = loanDate.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
                    if (dateMatch) {
                        const year = dateMatch[1];
                        const month = dateMatch[2].padStart(2, '0');
                        const day = dateMatch[3].padStart(2, '0');
                        loanDate = `${year}-${month}-${day}`;
                    }
                }

                const newCase = {
                    status: status,
                    method: rows[MAP_ROWS.CATEGORY]?.[col] || '',
                    date: loanDate,
                    borrower: borrowerName || `未知借款人_${col}`,
                    job: rows[MAP_ROWS.JOB]?.[col] || '',
                    loanAmount: loanAmount,
                    disbursed: cleanNumber(rows[MAP_ROWS.ACTUAL_AMOUNT]?.[col]) || loanAmount,
                    interestRate: cleanNumber(rows[MAP_ROWS.INTEREST_RATE]?.[col]) || 0,
                    agent: rows[MAP_ROWS.AGENT]?.[col] || '',
                    terms: terms,
                    repayDay: rows[MAP_ROWS.RULE_DAY]?.[col] || '',
                    principalPerTerm: principalPerTerm,
                    interestPerTerm: interestPerTerm,
                    negotiationPrincipal: status === '5' ? negotiationPrincipal : 0,
                    schedule: sortedSchedule,
                    repaidTerms: repaidTermsCount,
                    totalInterestIncome: totalInterestIncome,
                    lastRepaymentDate: lastRepaymentDate,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    note: rows.find(row => row[0]?.includes('附註'))?.[col] || '',
                    idNumber: '', 
                    address: '', 
                    telephone: '', 
                    mobile: '',
                };
                
                console.log(`解析第${col}列案件：${newCase.borrower}, 狀態=${newCase.status}, 金額=${newCase.loanAmount}, 放款日期=${newCase.date}`);
                parsedCases.push(newCase);
            }
            
            console.log(`CSV解析完成：共解析 ${parsedCases.length} 筆案件`);
            return parsedCases;
        };
        
        const showLoading = (show, text = "處理中...") => {
            const modal = document.getElementById('loading-modal');
            const textEl = document.getElementById('loading-text');
            if (modal) {
                if (show) {
                    modal.classList.remove('hidden');
                    if (textEl) textEl.textContent = text;
                    state.isImporting = true;
                } else {
                    modal.classList.add('hidden');
                    state.isImporting = false;
                }
            }
            renderApp(); 
        };

        window.handleFileSelect = () => { document.getElementById('csvFileInput').click(); };

        window.handleFileChange = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            if (file.type !== 'text/csv' && !file.name.endsWith('.csv')) { window.showError("請選擇有效的 CSV 檔案。"); return; }

            const reader = new FileReader();
            reader.readAsText(file, 'Big5');

            reader.onload = async (e) => {
                const csvText = e.target.result;
                try { await window.processCsvData(csvText); } 
                catch (error) { showLoading(false); console.error("CSV 處理失敗:", error); window.showError(`CSV 匯入處理失敗。`); }
            };
            event.target.value = ''; 
        };
        
        window.processCsvData = async (csvText) => {
            if (!state.currentUser && !state.isDemoMode) { window.showError("請先登入才能匯入資料。"); return; }
            
            showLoading(true, "正在解析檔案及計算合約金額...");
            
            let records = [];
            try { records = parseCSV(csvText); } 
            catch (e) { showLoading(false); window.showError(`CSV 解析錯誤: ${e.message}`); return; }

                                    content = `<span class="${field.isCurrency ? 'font-mono' : ''} ${field.isDanger && Number(val) > 0 ? 'text-red-600 font-bold' : 'text-gray-700'}">${field.isCurrency ? '$' : ''}${formatNumber(val)}</span>`;
                                }
                            }
                            
                            let stickyClass = '';
                            let style = `min-width: ${field.widthVal}px; max-width: ${field.widthVal}px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;`;
                            
                            if (idx <= 4) { 
                                stickyClass = `sticky z-20 bg-white border-r border-gray-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]`;
                                style += ` left: ${listStickyOffsets[idx]}px;`;
                            } else {
                                style += ` border-r border-gray-100;`;
                            }
                            if (field.key === 'paymentStatus' && isOverdue && !isBadDebt) stickyClass = stickyClass.replace('bg-white', 'bg-emerald-100');

                            return `<td class="py-2 px-2 text-sm text-center ${field.font || ''} ${stickyClass}" style="${style}" title="${val||''}">${content}</td>`;
                        }).join('');

                        return `<tr class="hover:bg-gray-50 transition-colors">${batchSelectCell}${regularCells}</tr>`;
                    }).join('');
                }
                lucide.createIcons();
            }
            
            if (mobileContainer) {
                mobileContainer.innerHTML = generateMobileCardsHtml();
                lucide.createIcons();
            }

            if (paginationInfo && btnPrev && btnNext && btnFirst && btnLast && pageInput) {
                let sourceRecords = state.records;
                
                // 修正：在 demo 模式下，只顯示 demo 資料
                if (state.isDemoMode) {
                    sourceRecords = state.records.filter(r => r.ownerUid === 'demo');
                } else if (state.isAdmin && state.viewingUid !== 'all' && state.viewingUid !== null) {
                    sourceRecords = state.records.filter(r => r.ownerUid === state.viewingUid);
                } else if (!state.isAdmin && !state.isDemoMode) {
                    sourceRecords = state.records.filter(r => r.ownerUid === state.currentUserUid);
                }
                
                const searchTerm = state.searchTerm.toLowerCase();
                let filtered = sourceRecords.filter(r => 
                    (r.borrower?.toLowerCase().includes(searchTerm) || 
                     r.displayId?.toLowerCase().includes(searchTerm) ||
                     r.method?.toLowerCase().includes(searchTerm))
                );
                
                // 修正排序邏輯
                filtered.sort((a, b) => {
                    const dateA = a.date ? new Date(a.date.replace(/\//g, '-')) : new Date('9999-12-31');
                    const dateB = b.date ? new Date(b.date.replace(/\//g, '-')) : new Date('9999-12-31');
                    return dateA - dateB;
                });
                
                if (state.unpaidFilter === 'all_unpaid') {
                    filtered = filtered.filter(r => {
                        const { isPaid } = getPaymentStatus(r);
                        return (r.status === '1' || r.status === '2' || r.status === '5') && !isPaid;
                    });
                } else if (state.unpaidFilter === 'current_unpaid') {
                    filtered = filtered.filter(r => {
                        const { isPaid, isOverdue } = getPaymentStatus(r);
                        return (r.status === '1' || r.status === '2' || r.status === '5') && !isPaid && isOverdue;
                    });
                }
                
                // 狀態篩選
                if (state.statusFilter === 'bad_debt') {
                    filtered = filtered.filter(r => r.status === '3' || r.status === '4');
                } else if (state.statusFilter === 'managed') {
                    filtered = filtered.filter(r => r.status === '2');
                } else if (state.statusFilter === 'closed') {
                    filtered = filtered.filter(r => r.status === '0');
                } else if (state.statusFilter === 'negotiation') {
                    filtered = filtered.filter(r => r.status === '5');
                }
                
                // 篩選狀態1、2、3和5的案件
                if (state.activeCasesFilter && !state.statusFilter) {
                    filtered = filtered.filter(r => r.status === '1' || r.status === '2' || r.status === '3' || r.status === '5');
                }
                
                const filteredWithDisplayIds = calculateDisplayIds(filtered);
                const totalPages = Math.ceil(filteredWithDisplayIds.length / state.itemsPerPage) || 1;
                
                paginationInfo.textContent = `第 ${state.currentPage} 頁 / 共 ${totalPages} 頁 (共 ${filteredWithDisplayIds.length} 筆)`;
                btnFirst.disabled = state.currentPage === 1;
                btnPrev.disabled = state.currentPage === 1;
                btnNext.disabled = state.currentPage >= totalPages || filteredWithDisplayIds.length === 0;
                btnLast.disabled = state.currentPage >= totalPages || filteredWithDisplayIds.length === 0;
                
                pageInput.value = state.currentPage;
                pageInput.max = totalPages;
                pageInput.min = 1;
            }
        };

able>${(state.tempScheduleLines || []).length === 0 ? '<div class="p-8 text-center text-gray-400 text-sm">尚無還款紀錄</div>' : ''}</div><div class="p-4 border-t border-gray-100 bg-gray-50 shrink-0 flex justify-between items-center"><button onclick="window.addScheduleLine()" class="text-emerald-600 hover:text-emerald-800 text-sm font-medium flex items-center"><i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增一筆</button></div>`}</div><div class="p-4 border-t border-gray-100 bg-gray-50 text-right shrink-0 flex justify-end gap-2"><button onclick="window.updateState({activeModal: {type: null, record: null}})" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg text-sm">取消</button><button onclick="window.saveModalData('${record.id}', '${state.activeModal.type}')" class="px-4 py-2 ${!isNote ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-blue-600 hover:bg-blue-700'} text-white rounded-lg text-sm font-medium">儲存</button></div></div></div>`;

                                i = Number(r.interestPerTerm) || 0;
                            } else {
                                p = Number(r.principalPerTerm) || 0;
                                i = Number(r.interestPerTerm) || 0;
                            }
                            
                            const { isPaid, isOverdue } = getPaymentStatus(r);
                            let paymentStatusHtml = '';
                            if (isPaid) {
                                paymentStatusHtml = `<span class="text-emerald-600 font-bold text-xs"><i data-lucide="check" class="w-3 h-3 inline"></i>已繳清</span>`;
                            } else if (isOverdue) {
                                paymentStatusHtml = `<span class="text-red-600 font-bold text-xs"><i data-lucide="alert-triangle" class="w-3 h-3 inline"></i>逾期</span>`;
                            } else {
                                paymentStatusHtml = `<span class="text-gray-500 font-bold text-xs">未繳</span>`;
                            }
                            
                            const total = p + i;
                            
                            let cells = `<td class="p-2 font-bold text-gray-800">${r.borrower} <span class="text-xs font-normal text-gray-400">(${r.displayId || r.caseNumber || ''})</span></td>`;
                            
                            // 本月已收款：顯示本期本金、本期利息、合計（實際已收）
                            if (state.modalType === 'monthCollected') {
                                // 計算本月已收的金額
                                const entries = parseSchedule(r.schedule || '');
                                const now = new Date();
                                const currentMonth = now.getMonth();
                                const currentYear = now.getFullYear();
                                
                                const currentMonthEntries = entries.filter(e => 
                                    e.date && e.date.getFullYear() === currentYear && e.date.getMonth() === currentMonth
                                );
                                
                                const collectedPrincipal = currentMonthEntries.reduce((sum, e) => sum + e.principal, 0);
                                const collectedInterest = currentMonthEntries.reduce((sum, e) => sum + e.interest, 0);
                                const collectedTotal = collectedPrincipal + collectedInterest;
                                
                                cells += `
                                    <td class="p-2 text-right font-mono">${formatNumber(collectedPrincipal)}</td>
                                    <td class="p-2 text-right font-mono">${formatNumber(collectedInterest)}</td>
                                    <td class="p-2 text-right font-mono font-bold text-emerald-600">${formatNumber(collectedTotal)}</td>
                                `;
                            }
                            // 本月息差：顯示未繳的本期利息
                            else if (state.modalType === 'monthInterestDiff') {
                                if (!isPaid) {
                                    cells += `<td class="p-2 text-right font-mono font-bold text-red-600">${formatNumber(i)}</td>`;
                                } else {
                                    cells += `<td class="p-2 text-right font-mono text-gray-400">0</td>`;
                                }
                                cells += `
                                    <td class="p-2 text-center">
                                        <button onclick="window.handleRepaymentSelect('${r.id}'); window.updateState({modalType: null, activeTab: 'repayment'});" class="text-blue-600 hover:underline text-xs">
                                            ${paymentStatusHtml}
                                        </button>
                                    </td>
                                `;
                            }
                            // 本月應收息：顯示本期利息和繳款狀態
                            else if (state.modalType === 'monthInterestDue') {
                                cells += `
                                    <td class="p-2 text-right font-mono font-bold ${r.status === '5' ? 'text-purple-600' : 'text-blue-600'}">${formatNumber(i)}</td>
                                    <td class="p-2 text-center">
                                        <button onclick="window.handleRepaymentSelect('${r.id}'); window.updateState({modalType: null, activeTab: 'repayment'});" class="text-blue-600 hover:underline text-xs">
                                            ${paymentStatusHtml}
                                        </button>
                                    </td>
                                `;
                            }
                            // 本月已收息：顯示本月已收的利息
                            else if (state.modalType === 'monthInterestCollected') {
                                // 計算本月已收的利息
                                const entries = parseSchedule(r.schedule || '');
                                const now = new Date();
                                const currentMonth = now.getMonth();
                                const currentYear = now.getFullYear();
                                
                                const currentMonthEntries = entries.filter(e => 
                                    e.date && e.date.getFullYear() === currentYear && e.date.getMonth() === currentMonth
                                );
                                
                                const collectedInterest = currentMonthEntries.reduce((sum, e) => sum + e.interest, 0);
                                
                                cells += `<td class="p-2 text-right font-mono font-bold text-emerald-600">${formatNumber(collectedInterest)}</td>`;
                            }
                            // 其他情況（保持原來的顯示）
                            else if (state.modalType === 'monthDue' || state.modalType === 'monthDiff') {
                                cells += `
                                    <td class="p-2 text-right font-mono">${formatNumber(p)}</td>
                                    <td class="p-2 text-right font-mono">${formatNumber(i)}</td>
                                    <td class="p-2 text-right font-mono font-bold ${state.modalType === 'monthDiff' ? 'text-red-600' : (r.status === '5' ? 'text-purple-600' : 'text-blue-600')}">${formatNumber(total)}</td>
                                `;
                            } else if (state.modalType === 'negotiationDue' || state.modalType === 'negotiationCollected') {
                                cells += `<td class="p-2 text-right font-mono font-bold text-purple-600">${formatNumber(p)}</td>`;
                            } else if (state.modalType === 'unpaid') {
                                cells += `<td class="p-2 text-right font-mono text-red-600 font-bold">${formatNumber(total)}</td>`;
                            }
                            
                            if (state.modalType !== 'monthInterestDiff' && state.modalType !== 'monthInterestDue' && state.modalType !== 'monthDue' && state.modalType !== 'monthDiff' && state.modalType !== 'unpaid') {
                                cells += `<td class="p-2 text-center"><span class="px-2 py-1 rounded text-xs ${status.color}">${status.text}</span></td>`;
                            } else if (state.modalType === 'monthInterestDiff' || state.modalType === 'monthInterestDue') {
                                cells += `<td class="p-2 text-center"><span class="px-2 py-1 rounded text-xs ${status.color}">${status.text}</span></td>`;
                            } else {
                                cells += `<td class="p-2 text-center"><span class="px-2 py-1 rounded text-xs ${status.color}">${status.text}</span></td>`;
                            }
                            
                            if (state.modalType !== 'unpaid' && state.modalType !== 'monthDiff' && state.modalType !== 'negotiationCollected' && state.modalType !== 'monthInterestCollected') {
                                cells += `<td class="p-2 text-center"><button onclick="window.updateState({modalType: null}); window.startEdit('${r.id}')" class="text-blue-600 hover:underline text-xs">前往處理</button></td>`;
                            }
                            
                            return `<tr class="hover:bg-gray-50 transition-colors">${cells}</tr>`;
                        };
                    }

                    modalHtml += `<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in backdrop-blur-sm"><div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[80vh] flex flex-col"><div class="p-4 flex justify-between items-center text-white shrink-0 bg-gradient-to-r from-blue-600 to-indigo-600"><h3 class="font-bold flex items-center"><i data-lucide="list" class="w-5 h-5 mr-2"></i> 案件列表</h3><button onclick="window.updateState({modalType: null})" class="hover:bg-white/20 p-1 rounded"><i data-lucide="x" class="w-5 h-5"></i></button></div><div class="p-0 overflow-y-auto flex-1"><table class="w-full text-left border-collapse"><thead class="bg-gray-50 text-gray-500 text-xs uppercase sticky top-0">${customHeaders}</thead><tbody class="divide-y divide-gray-100 text-sm">${filteredWithDisplayIds.map(r => { const calc = calculateDerivedData(r); const status = getStatusLabel(r.status); return customRowBuilder(r, calc, status); }).join('')}</tbody></table></div></div></div>`;
                }

                app.innerHTML = `<div class="flex h-screen bg-slate-100 font-sans text-gray-800">
                    <div class="w-20 sm:w-64 bg-slate-900 text-white flex flex-col justify-between fixed h-full z-20 transition-all duration-300">
                        <div>
                            <div class="p-6 flex items-center justify-center sm:justify-start border-b border-slate-700">
                                <i data-lucide="wallet" class="w-8 h-8 text-emerald-400 mr-0 sm:mr-3"></i>
                                <span class="hidden sm:block text-xl font-bold tracking-wider">財務管理</span>
                            </div>
                            <div class="px-6 py-4 flex items-center border-b border-slate-800 mb-2">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold mr-3 ${state.isDemoMode ? 'bg-amber-500' : 'bg-slate-700'}">${state.isDemoMode ? 'T' : (state.currentUser ? state.currentUser.substring(0, 2).toUpperCase() : 'U')}</div>
                                <div class="hidden sm:block">
                                    <p class="text-xs text-slate-400">${state.isDemoMode ? "試用模式" : "已登入"}</p>
                                    <p class="text-sm font-bold text-white truncate w-32">${state.isDemoMode ? "訪客 (不儲存)" : state.currentUser}</p>
                                </div>
                            </div>
                            <nav class="mt-4 px-4 space-y-2">
                                <button onclick="window.setActiveTab('dashboard')" class="w-full flex items-center p-3 rounded-lg transition-colors ${state.activeTab === 'dashboard' ? 'bg-emerald-600' : 'hover:bg-slate-800'}">
                                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                                    <span class="hidden sm:block">營運報表</span>
                                </button>
                                <button onclick="window.setActiveTab('list')" class="w-full flex items-center p-3 rounded-lg transition-colors ${state.activeTab === 'list' ? 'bg-emerald-600' : 'hover:bg-slate-800'}">
                                    <i data-lucide="database" class="w-5 h-5 mr-3"></i>
                                    <span class="hidden sm:block">案件列表</span>
                                </button>
                                <button onclick="window.setActiveTab('repayment')" class="w-full flex items-center p-3 rounded-lg transition-colors ${state.activeTab === 'repayment' ? 'bg-emerald-600' : 'hover:bg-slate-800'}">
                                    <i data-lucide="banknote" class="w-5 h-5 mr-3"></i>
                                    <span class="hidden sm:block">還款輸入</span>
                                </button>
                                <button onclick="window.open('user_manual.html', '_blank')" class="w-full flex items-center p-3 rounded-lg transition-colors hover:bg-slate-800">
                                    <i data-lucide="book-open" class="w-5 h-5 mr-3"></i>
                                    <span class="hidden sm:block">使用手冊</span>
                                </button>
                                ${state.isAdmin && !state.isDemoMode ? `
                                <button onclick="window.setActiveTab('admin')" class="w-full flex items-center p-3 rounded-lg transition-colors ${state.activeTab === 'admin' ? 'bg-emerald-600' : 'hover:bg-slate-800'}">
                                    <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                                    <span class="hidden sm:block">用戶管理</span>
                                </button>` : ''}
                            </nav>
                        </div>
                        <div class="p-4 border-t border-slate-700 space-y-2">
                            <button onclick="window.handleLogout()" class="w-full flex items-center justify-center sm:justify-start p-3 rounded-lg text-slate-400 hover:bg-red-900/30 hover:text-red-400 transition-colors">
                                <i data-lucide="log-out" class="w-5 h-5 mr-0 sm:mr-2"></i>
                                <span class="hidden sm:block font-medium">登出系統</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex-1 ml-20 sm:ml-64 overflow-x-hidden">
                        ${content}
                    </div>
                    ${modalHtml}
                </div>`;
                
                if (state.activeTab === 'list') {
                    window.refreshListUI();
                }
            }
            lucide.createIcons();
        }

        // Init App
        if (firebaseAvailable && !state.isDemoMode) {
            onAuthStateChanged(auth, async (user) => {
                // 如果在 demo 模式，不要執行 Firebase 相關的監聽
                if (state.isDemoMode || state.demoModeLocked) {
                    console.log("在 demo 模式，跳過 Firebase 監聽");
                    return;
                }
                
                if (user) {
                    state.currentUser = user.displayName || user.email;
                    state.currentUserUid = user.uid;
                    state.isDemoMode = false;
                    state.demoModeLocked = false;
                    
                    if (state.viewingUid === null) {
                        state.viewingUid = user.uid;
                    }
                    
                    // 新增：載入用戶的卡片佈局
                    const savedLayout = await loadCardLayoutFromFirebase();
                    if (savedLayout) {
                        state.cardLayout = savedLayout;
                    }
                    
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'user_directory'), async (snap) => {
                        // 如果在 demo 模式，不要更新用戶目錄
                        if (state.isDemoMode || state.demoModeLocked) return;
                        
                        const allUsers = snap.docs.map(d => d.data());
                        state.usersDirectory = allUsers;
                        
                        const myProfile = allUsers.find(u => u.uid === state.currentUserUid);
                        
                        if (myProfile) {
                            const newIsAdmin = myProfile.role === 'admin';
                            
                            if (newIsAdmin !== state.isAdmin) {
                                state.isAdmin = newIsAdmin;
                                state.allowedStatus = myProfile.allowedStatus || ['0', '1', '3', '4', '5'];
                                renderApp();
                            } else {
                                state.allowedStatus = myProfile.allowedStatus || ['0', '1', '3', '4', '5'];
                                if (state.isAdmin) renderApp();
                            }
                        }

                        // 移除自動升級為管理員的邏輯
                        // 不再檢查是否只有一個用戶並自動升級
                        console.log("已移除自動升級為管理員的邏輯");
                    });

                    if (!state.isLoadingListener) {
                        const q = query(
                            collection(db, 'artifacts', appId, 'public', 'data', 'loan_records'), 
                            orderBy('date', 'asc')
                        );
                        onSnapshot(q, (snapshot) => {
                            // 如果在 demo 模式，不要更新記錄
                            if (state.isDemoMode || state.demoModeLocked) return;
                            
                            const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            
                            // 按日期排序
                            docs.sort((a, b) => {
                                const dateA = a.date ? new Date(a.date.replace(/\//g, '-')) : new Date('9999-12-31');
                                const dateB = b.date ? new Date(b.date.replace(/\//g, '-')) : new Date('9999-12-31');
                                return dateA - dateB;
                            });
                            
                            updateState({ records: docs });
                        });
                        state.isLoadingListener = true;
                    }
                } else {
                    // 只有在不是 demo 模式時才重置狀態
                    if (!state.isDemoMode && !state.demoModeLocked) {
                        updateState({ 
                            currentUser: null, 
                            currentUserUid: null,
                            currentUserName: 'Guest',
                            isAdmin: false,
                            allowedStatus: ['0', '1', '3', '4', '5'],
                            viewingUid: null,
                            usersDirectory: [],
                            isDemoMode: false,
                            demoModeLocked: false,
                            isRegistering: false,
                            authLoading: false,
                            activeTab: 'dashboard',
                            records: [],
                            cardLayout: initialCardLayout,
                            editingRecord: null,
                            searchTerm: '',
                            repaymentSearchTerm: '',
                            selectedRepaymentId: '',
                            repaymentDate: new Date().toISOString().split('T')[0],
                            repaymentPrincipal: '',
                            repaymentInterest: '',
                            currentPage: 1,
                            itemsPerPage: 10,
                            modalType: null,
                            showAIModal: false,
                            activeModal: { type: null, record: null },
                            tempScheduleLines: [],
                            isLoadingListener: false,
                            isImporting: false,
                            unpaidFilter: null,
                            batchDeleteMode: false,
                            selectedCasesForBatch: [],
                            activeCasesFilter: true,
                            cardColors: {},
                            history: [],
                            statusFilter: null
                        });
                        
                        formData = { ...initialFormState };
                        
                        if (typeof sessionStorage !== 'undefined') {
                            sessionStorage.removeItem('firebase:authUser:' + firebaseConfig.apiKey + ':' + appId);
                        }
                        
                        setTimeout(() => {
                            const searchInput = document.getElementById('searchInput');
                            if (searchInput) searchInput.value = '';
                        }, 0);
                    }
                    
                    renderApp();
                }
            });
        } else {
            renderApp();
        }

    </script>
</body>
</html>
